name: Update Dependency

on:
  repository_dispatch:
    types: [dependency-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Update pattern-collector
        run: |
          npm update pattern-collector

      - name: Run Tests
        run: |
          node test/v2/test.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependency pattern-collector"
          title: "chore: update dependency pattern-collector"
          body: "Automated dependency update for pattern-collector"
          branch: "update-pattern-collector"
